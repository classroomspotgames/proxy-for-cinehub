<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>cinehub proxy</title>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script src="/baremux/index.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
  --pink: #e8849a;
  --pink-light: #f2b5c4;
  --glass-border: rgba(232, 132, 154, 0.2);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: 'Raleway', sans-serif;
  background: #0a0810;
}

/* ===== BACKGROUND ===== */
#bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

#bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.72) saturate(1.15);
}

#bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 110%, rgba(0,0,0,0.65) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 50% -10%, rgba(0,0,0,0.4) 0%, transparent 70%);
  pointer-events: none;
}

/* ===== TOP BROWSER BAR ===== */
.browser-ui {
  position: relative;
  z-index: 200;
  height: 74px;
  background: rgba(6, 4, 14, 0.82);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: flex;
  flex-direction: column;
  border-bottom: 1px solid var(--glass-border);
  box-shadow: 0 1px 30px rgba(0,0,0,0.5);
}

/* ===== TABS ===== */
.tabs {
  height: 30px;
  display: flex;
  align-items: flex-end;
  padding: 0 8px;
  gap: 3px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }

.tab {
  height: 24px;
  min-width: 130px;
  max-width: 200px;
  padding: 0 10px;
  border-radius: 6px 6px 0 0;
  background: rgba(255,255,255,0.04);
  color: #888;
  display: flex;
  align-items: center;
  gap: 7px;
  cursor: pointer;
  font-size: 11.5px;
  font-family: 'Raleway', sans-serif;
  font-weight: 500;
  letter-spacing: 0.3px;
  transition: background 0.2s, color 0.2s;
  border-top: 1px solid transparent;
  border-left: 1px solid transparent;
  border-right: 1px solid transparent;
  user-select: none;
}

.tab.active {
  background: rgba(232, 132, 154, 0.12);
  color: var(--pink-light);
  border-color: var(--glass-border);
}

.tab:not(.active):hover {
  background: rgba(255,255,255,0.07);
  color: #bbb;
}

.tab span {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.tab .tab-close {
  opacity: 0.4;
  font-size: 10px;
  transition: opacity 0.15s, color 0.15s;
  flex-shrink: 0;
}
.tab:hover .tab-close { opacity: 0.75; }
.tab .tab-close:hover { opacity: 1 !important; color: #ff6b6b; }

.newtab {
  width: 26px;
  height: 26px;
  border-radius: 5px;
  border: none;
  background: transparent;
  color: #666;
  cursor: pointer;
  font-size: 12px;
  transition: background 0.2s, color 0.2s;
  align-self: center;
  margin-bottom: 2px;
}
.newtab:hover { background: rgba(232,132,154,0.12); color: var(--pink); }

/* ===== NAV BAR ===== */
.navbar {
  height: 44px;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 10px;
}

.nav-btn {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: none;
  background: transparent;
  color: #777;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.2s, color 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.nav-btn:hover {
  background: rgba(232, 132, 154, 0.15);
  color: var(--pink-light);
}

/* ===== URL BAR ===== */
.urlbar {
  flex: 1;
  height: 30px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 15px;
  padding: 0 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
}
.urlbar:focus-within {
  background: rgba(255,255,255,0.09);
  border-color: var(--pink);
  box-shadow: 0 0 12px rgba(232,132,154,0.2);
}
.urlbar .url-icon { color: #555; font-size: 11px; flex-shrink: 0; }
.urlbar input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: #ccc;
  font-size: 12.5px;
  font-family: 'Raleway', sans-serif;
}
.urlbar input::placeholder { color: #555; }

/* ===== VIEWPORT ===== */
.viewframe {
  position: absolute;
  top: 74px;
  left: 0;
  width: 100%;
  height: calc(100% - 74px);
  border: none;
  display: none;
  z-index: 100;
}
.viewframe.active { display: block; }

/* ===== NTP ===== */
.ntp {
  position: absolute;
  top: 74px;
  left: 0;
  width: 100%;
  height: calc(100% - 74px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

.ntp-clock {
  font-family: 'Cinzel', serif;
  font-size: clamp(60px, 9vw, 108px);
  font-weight: 700;
  color: rgba(255,255,255,0.93);
  letter-spacing: 4px;
  line-height: 1;
  text-shadow:
    0 0 60px rgba(232, 132, 154, 0.45),
    0 4px 40px rgba(0,0,0,0.9),
    0 0 120px rgba(232,132,154,0.15);
  margin-bottom: 12px;
  pointer-events: none;
  user-select: none;
}

.ntp-date {
  font-family: 'Raleway', sans-serif;
  font-size: clamp(11px, 1.3vw, 16px);
  font-weight: 600;
  letter-spacing: 7px;
  text-transform: uppercase;
  color: var(--pink);
  text-shadow: 0 0 24px rgba(232,132,154,0.6), 0 2px 10px rgba(0,0,0,0.8);
  margin-bottom: 48px;
  pointer-events: none;
  user-select: none;
}

/* NTP Search */
.ntp-search-form {
  width: min(640px, 85vw);
  margin-bottom: 52px;
}

.ntp-search-wrap {
  height: 50px;
  background: rgba(5, 3, 12, 0.65);
  border: 1px solid rgba(232,132,154,0.22);
  border-radius: 25px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
}
.ntp-search-wrap:focus-within {
  background: rgba(5, 3, 12, 0.8);
  border-color: var(--pink);
  box-shadow: 0 0 30px rgba(232,132,154,0.25), 0 8px 32px rgba(0,0,0,0.5);
}
.ntp-search-wrap i { color: var(--pink); font-size: 15px; flex-shrink: 0; opacity: 0.75; }
.ntp-search-wrap input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #e0d8e8;
  font-size: 15px;
  font-family: 'Raleway', sans-serif;
}
.ntp-search-wrap input::placeholder { color: rgba(200,180,210,0.35); }

/* Quick Links */
.ntp-links {
  display: flex;
  gap: 28px;
  flex-wrap: wrap;
  justify-content: center;
}

.ntp-link {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: transform 0.2s;
  text-decoration: none;
}
.ntp-link:hover { transform: translateY(-4px); }

.ntp-link-icon {
  width: 58px;
  height: 58px;
  border-radius: 50%;
  background: rgba(5, 3, 12, 0.65);
  border: 1px solid rgba(232,132,154,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 21px;
  color: var(--pink);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
}
.ntp-link:hover .ntp-link-icon {
  background: rgba(232,132,154,0.15);
  border-color: var(--pink);
  box-shadow: 0 0 20px rgba(232,132,154,0.35);
}

.ntp-link-label {
  font-size: 12px;
  font-weight: 500;
  color: rgba(220,200,225,0.7);
  letter-spacing: 0.5px;
  transition: color 0.2s;
}
.ntp-link:hover .ntp-link-label { color: var(--pink-light); }

/* Petals */
@keyframes petalfall {
  0%   { transform: translateY(-30px) translateX(0px) rotate(0deg);   opacity: 0; }
  8%   { opacity: 1; }
  92%  { opacity: 0.6; }
  100% { transform: translateY(110vh) translateX(60px) rotate(540deg); opacity: 0; }
}

.petal {
  position: fixed;
  border-radius: 50% 50% 50% 0;
  background: var(--pink-light);
  pointer-events: none;
  z-index: 5;
  animation: petalfall linear infinite;
}
</style>
</head>

<body>

<!-- Background GIF -->
<div id="bg">
  <img src="cherry-blossom-tree.gif" alt="cherry blossom background">
</div>

<!-- Petals container -->
<div id="petals"></div>

<!-- Browser Chrome -->
<div class="browser-ui">
  <div class="tabs" id="tabs">
    <button class="newtab" id="newtab" title="New tab"><i class="fas fa-plus"></i></button>
  </div>

  <div class="navbar">
    <button class="nav-btn" id="back"    title="Back">   <i class="fas fa-arrow-left"></i></button>
    <button class="nav-btn" id="forward" title="Forward"><i class="fas fa-arrow-right"></i></button>
    <button class="nav-btn" id="reload"  title="Reload"> <i class="fas fa-rotate-right"></i></button>

    <form class="urlbar" id="form">
      <i class="url-icon fas fa-magnifying-glass"></i>
      <input id="url" placeholder="Search or enter address">
    </form>

    <button class="nav-btn" id="popout" title="Pop out"><i class="fas fa-external-link"></i></button>
  </div>
</div>

<!-- New Tab Page -->
<div class="ntp" id="ntp">
  <div class="ntp-clock" id="clock">12:00 AM</div>
  <div class="ntp-date"  id="datestr">SATURDAY, FEBRUARY 28</div>

  <form class="ntp-search-form" id="ntp-form">
    <div class="ntp-search-wrap">
      <i class="fas fa-magnifying-glass"></i>
      <input id="ntp-url" placeholder="Search the web or enter URL...">
    </div>
  </form>

  <div class="ntp-links">
    <a class="ntp-link" data-url="https://duckduckgo.com">
      <div class="ntp-link-icon"><i class="fas fa-globe"></i></div>
      <span class="ntp-link-label">DuckDuckGo</span>
    </a>
    <a class="ntp-link" data-url="https://wikipedia.org">
      <div class="ntp-link-icon"><i class="fas fa-book-open"></i></div>
      <span class="ntp-link-label">Wikipedia</span>
    </a>
    <a class="ntp-link" data-url="https://vscode.dev">
      <div class="ntp-link-icon"><i class="fas fa-code"></i></div>
      <span class="ntp-link-label">VS Code</span>
    </a>
    <a class="ntp-link" data-url="https://music.youtube.com">
      <div class="ntp-link-icon"><i class="fas fa-music"></i></div>
      <span class="ntp-link-label">Music</span>
    </a>
    <a class="ntp-link" data-url="https://twitch.tv">
      <div class="ntp-link-icon"><i class="fas fa-gamepad"></i></div>
      <span class="ntp-link-label">Gaming</span>
    </a>
    <a class="ntp-link" data-url="https://reddit.com">
      <div class="ntp-link-icon"><i class="fab fa-reddit-alien"></i></div>
      <span class="ntp-link-label">Reddit</span>
    </a>
  </div>
</div>

<script>
// ===== SERVICE WORKER =====
navigator.serviceWorker?.register("/uv/sw.js")
const connection = new BareMux.BareMuxConnection("/baremux/worker.js")
connection.setTransport("/libcurl/index.mjs", [{ websocket: "wss://wisp.rhw.one/" }])

// ===== CLOCK =====
function updateClock() {
  const now = new Date()
  let h = now.getHours(), m = now.getMinutes()
  const ampm = h >= 12 ? 'PM' : 'AM'
  h = h % 12 || 12
  document.getElementById('clock').textContent =
    `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')} ${ampm}`
  const days = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY']
  const months = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE',
                  'JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER']
  document.getElementById('datestr').textContent =
    `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`
}
updateClock()
setInterval(updateClock, 1000)

// ===== FALLING PETALS =====
const petalColors = ['#f2b5c4','#e8849a','#fad4df','#eda0b3','#f9c3d0']
const petalsEl = document.getElementById('petals')
for (let i = 0; i < 20; i++) {
  const p = document.createElement('div')
  p.className = 'petal'
  const size = 6 + Math.random() * 7
  p.style.cssText = `
    left: ${Math.random() * 100}vw;
    width: ${size}px;
    height: ${size * 1.3}px;
    animation-duration: ${9 + Math.random() * 14}s;
    animation-delay: ${-Math.random() * 18}s;
    background: ${petalColors[Math.floor(Math.random() * petalColors.length)]};
    opacity: ${0.5 + Math.random() * 0.4};
  `
  petalsEl.appendChild(p)
}

// ===== TAB SYSTEM =====
const tabsEl    = document.getElementById("tabs")
const newTabBtn = document.getElementById("newtab")
const urlInput  = document.getElementById("url")
const ntpEl     = document.getElementById("ntp")

let tabs = [], activeId = null, idCounter = 0

function createTab(url = "") {
  const id = idCounter++
  const iframe = document.createElement("iframe")
  iframe.className = "viewframe"
  iframe.dataset.id = id
  iframe.setAttribute("sandbox","allow-scripts allow-same-origin allow-forms allow-modals allow-popups")
  document.body.appendChild(iframe)

  const tabBtn = document.createElement("div")
  tabBtn.className = "tab"
  tabBtn.dataset.id = id
  tabBtn.innerHTML = `<span>New Tab</span><i class="fas fa-xmark tab-close"></i>`
  tabBtn.addEventListener("click", e => {
    if (e.target.classList.contains("tab-close")) closeTab(id)
    else activateTab(id)
  })
  tabsEl.insertBefore(tabBtn, newTabBtn)
  tabs.push({ id, iframe, tabBtn, history: [], index: -1 })
  activateTab(id)
  if (url) navigate(url)
}

function activateTab(id) {
  activeId = id
  tabs.forEach(t => {
    t.iframe.classList.toggle("active", t.id === id)
    t.tabBtn.classList.toggle("active", t.id === id)
  })
  const tab = getTab()
  if (!tab) return
  if (tab.index >= 0) {
    urlInput.value = tab.history[tab.index]
    ntpEl.style.display = "none"
  } else {
    urlInput.value = ""
    ntpEl.style.display = "flex"
  }
}

function closeTab(id) {
  if (tabs.length === 1) return
  const i = tabs.findIndex(t => t.id === id)
  tabs[i].iframe.remove()
  tabs[i].tabBtn.remove()
  tabs.splice(i, 1)
  activateTab(tabs[Math.max(0, i - 1)].id)
}

function normalize(input) {
  input = input.trim()
  if (!input.includes(".") && !input.startsWith("http"))
    return "https://search.brave.com/search?q=" + encodeURIComponent(input)
  if (!input.startsWith("http")) return "https://" + input
  return input
}

function navigate(input, push = true) {
  const tab = getTab()
  if (!tab) return
  const url = normalize(input)
  if (push) {
    tab.history = tab.history.slice(0, tab.index + 1)
    tab.history.push(url)
    tab.index++
  }
  tab.iframe.src = __uv$config.prefix + __uv$config.encodeUrl(url)
  urlInput.value = url
  ntpEl.style.display = "none"
  tab.iframe.onload = () => {
    try {
      tab.tabBtn.querySelector("span").textContent =
        tab.iframe.contentDocument?.title || new URL(url).hostname
    } catch(e) {}
  }
}

function getTab() { return tabs.find(t => t.id === activeId) }

// Nav controls
document.getElementById("back").onclick = () => {
  const t = getTab(); if (t && t.index > 0) { t.index--; navigate(t.history[t.index], false) }
}
document.getElementById("forward").onclick = () => {
  const t = getTab(); if (t && t.index < t.history.length - 1) { t.index++; navigate(t.history[t.index], false) }
}
document.getElementById("reload").onclick = () => {
  const t = getTab(); if (t) t.iframe.src = t.iframe.src
}
document.getElementById("popout").onclick = () => {
  const t = getTab(); if (t) window.open(t.iframe.src, "_blank")
}
document.getElementById("form").onsubmit = e => {
  e.preventDefault(); if (urlInput.value.trim()) navigate(urlInput.value)
}
newTabBtn.onclick = () => createTab()

// NTP search
document.getElementById("ntp-form").onsubmit = e => {
  e.preventDefault()
  const val = document.getElementById("ntp-url").value.trim()
  if (val) { navigate(val); document.getElementById("ntp-url").value = "" }
}

// NTP quick links
document.querySelectorAll(".ntp-link").forEach(a => {
  a.addEventListener("click", e => { e.preventDefault(); navigate(a.dataset.url) })
})

createTab()
</script>

</body>
</html>
